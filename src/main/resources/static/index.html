<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Reader</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- Landing Page -->
        <div id="landing" class="page active">
            <header>
                <h1>Greek Reader</h1>
                <p class="subtitle">Read ancient texts with inline dictionary</p>
            </header>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by author or work name..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div id="recentWorks" class="recent-works">
                <h2>Recent Works</h2>
                <div id="recentList"></div>
            </div>
        </div>

        <!-- Reader Page -->
        <div id="reader" class="page">
            <nav class="reader-nav">
                <button id="backBtn" class="nav-btn">&larr; Back</button>
                <span id="workTitle" class="work-title"></span>
                <div class="nav-controls">
                    <button id="prevBtn" class="nav-btn">&laquo; Prev</button>
                    <span id="sectionInfo" class="section-info"></span>
                    <button id="nextBtn" class="nav-btn">Next &raquo;</button>
                </div>
            </nav>
            <div id="readerContent" class="reader-content">
                <div id="originalPane" class="pane">
                    <h3 class="pane-title">Original</h3>
                    <div id="originalText" class="text-content"></div>
                </div>
                <div class="pane-divider"></div>
                <div id="translationPane" class="pane">
                    <h3 class="pane-title">English Translation</h3>
                    <div id="translationText" class="text-content"></div>
                </div>
            </div>
        </div>

        <!-- Hamburger Menu -->
        <button id="hamburgerBtn" class="hamburger-btn" title="Menu">
            <span></span><span></span><span></span>
        </button>
        <div id="sideMenu" class="side-menu">
            <div class="side-menu-header">
                <span>Settings</span>
                <button id="closeMenu" class="side-menu-close">&times;</button>
            </div>
            <div class="side-menu-items">
                <div class="side-menu-item side-menu-select">
                    <span class="menu-icon">&#129302;</span>
                    <div class="menu-select-group">
                        <label for="modelSelect">AI Model</label>
                        <select id="modelSelect">
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                            <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
                            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                            <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash 8B</option>
                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                        </select>
                    </div>
                </div>
                <button id="changeApiKeyBtn" class="side-menu-item">
                    <span class="menu-icon">&#128273;</span>
                    <span>Change API Key</span>
                </button>
            </div>
        </div>
        <div id="menuOverlay" class="menu-overlay"></div>

        <!-- Theme Picker -->
        <button id="themeBtnLanding" class="theme-toggle" title="Change theme">&#9681;</button>
        <div id="themePicker" class="theme-picker">
            <div class="theme-picker-header">Theme</div>
            <div class="theme-grid">
                <button class="theme-swatch" data-theme="parchment" title="Parchment">
                    <span class="swatch-preview" style="background:#f5f0e8;color:#3a2a1a;">Aa</span>
                    <span class="swatch-label">Parchment</span>
                </button>
                <button class="theme-swatch" data-theme="sepia" title="Sepia">
                    <span class="swatch-preview" style="background:#f4ecd8;color:#433422;">Aa</span>
                    <span class="swatch-label">Sepia</span>
                </button>
                <button class="theme-swatch" data-theme="ivory" title="Ivory">
                    <span class="swatch-preview" style="background:#faf8f0;color:#2a2a2a;">Aa</span>
                    <span class="swatch-label">Ivory</span>
                </button>
                <button class="theme-swatch" data-theme="slate" title="Slate">
                    <span class="swatch-preview" style="background:#f0f2f5;color:#1a2332;">Aa</span>
                    <span class="swatch-label">Slate</span>
                </button>
                <button class="theme-swatch" data-theme="ocean" title="Ocean">
                    <span class="swatch-preview" style="background:#eef4f8;color:#1a3040;">Aa</span>
                    <span class="swatch-label">Ocean</span>
                </button>
                <button class="theme-swatch" data-theme="mint" title="Mint">
                    <span class="swatch-preview" style="background:#f0f7f4;color:#1a3028;">Aa</span>
                    <span class="swatch-label">Mint</span>
                </button>
                <button class="theme-swatch" data-theme="dark" title="Dark">
                    <span class="swatch-preview" style="background:#1e1e2e;color:#cdd6f4;">Aa</span>
                    <span class="swatch-label">Dark</span>
                </button>
                <button class="theme-swatch" data-theme="midnight" title="Midnight">
                    <span class="swatch-preview" style="background:#0d1117;color:#c9d1d9;">Aa</span>
                    <span class="swatch-label">Midnight</span>
                </button>
            </div>
        </div>

        <!-- Tooltip -->
        <div id="tooltip" class="tooltip"></div>

        <!-- Selection popup -->
        <div id="selectionPopup" class="selection-popup">
            <button id="analyzeBtn" class="analyze-btn">Analyze with AI</button>
        </div>

        <!-- AI Analysis Panel -->
        <div id="analysisPanel" class="analysis-panel">
            <div class="analysis-header">
                <span class="analysis-title">AI Analysis</span>
                <button id="closeAnalysis" class="analysis-close">&times;</button>
            </div>
            <div id="analysisContent" class="analysis-content"></div>
        </div>

        <!-- API Key Modal -->
        <div id="apiKeyModal" class="modal-overlay">
            <div class="modal">
                <h3>Gemini API Key</h3>
                <p>Enter your Google Gemini API key to enable AI analysis.</p>
                <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
                <div class="modal-actions">
                    <button id="apiKeySave" class="modal-btn primary">Save</button>
                    <button id="apiKeyCancel" class="modal-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Loading overlay -->
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p id="loadingText">Loading...</p>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
